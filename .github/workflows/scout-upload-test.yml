# Test workflow: upload a debug artifact to base14 Scout on the nbg1 cluster (axi tenant).
# ------------------------------------------------------------------------------------------
# Adapted from apps/scout-api/examples/github-actions-upload-snabbit.yml.
# Put this file in a DEDICATED throwaway repo at .github/workflows/scout-upload-test.yml
# and trigger it from the Actions tab (workflow_dispatch). It generates a small dummy
# artifact, so you don't need real ProGuard/Dart symbols to exercise the flow.
#
# PREREQUISITES (one-time, done outside this repo):
#   1. axi-scout-api on nbg1 has S3 storage configured (base14-infra branch
#      test/nbg1-artifact-upload) and ArgoCD has synced it.
#   2. This repo's numeric GitHub repository_id is registered in ci_upload_trust for the
#      axi account (super-admin API). Until that row exists, every upload is 401.
#
# NOTES:
#   - The OIDC token audience MUST be exactly "scout.base14.io/axi".
#   - RUM_SERVICE_ALLOWLIST is empty on nbg1, so any app_identifier is accepted.

name: Scout artifact upload test (nbg1 / axi)

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: Application version
        required: true
        type: string
        default: 1.0.0
      build_number:
        description: Build number
        required: true
        type: string
        default: "1"

permissions:
  id-token: write   # required to mint the OIDC token
  contents: read

env:
  SCOUT_BASE_URL: https://api.play-nbg1.base14.io/axi
  SCOUT_AUDIENCE: scout.base14.io/axi
  APP_IDENTIFIER: axi-test-ios
  PLATFORM: ios
  ARTIFACT_TYPE: dsym

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a dummy artifact
        run: |
          set -euo pipefail
          head -c 2048 /dev/urandom | base64 > mapping.txt
          echo "ARTIFACT_PATH=mapping.txt" >> "$GITHUB_ENV"

      - name: Mint Scout OIDC token
        id: oidc
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken(process.env.SCOUT_AUDIENCE)
            core.setSecret(token)
            core.setOutput('token', token)

      - name: Upload artifact to Scout
        env:
          SCOUT_TOKEN: ${{ steps.oidc.outputs.token }}
          APP_VERSION: ${{ inputs.app_version }}
          BUILD_NUMBER: ${{ inputs.build_number }}
        run: |
          set -euo pipefail

          if [ ! -f "$ARTIFACT_PATH" ]; then
            echo "::error::artifact not found: $ARTIFACT_PATH"
            exit 1
          fi

          CHECKSUM=$(sha256sum "$ARTIFACT_PATH" | cut -d' ' -f1)
          SIZE=$(stat -c%s "$ARTIFACT_PATH")
          echo "checksum=$CHECKSUM size=$SIZE"

          # 1) Register metadata -> signed upload URL (idempotent by checksum).
          REGISTER=$(curl -sS -X POST "$SCOUT_BASE_URL/api/v1/artifacts" \
            -H "Authorization: Bearer $SCOUT_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n \
                  --arg app_identifier "$APP_IDENTIFIER" \
                  --arg app_version "$APP_VERSION" \
                  --arg build_number "$BUILD_NUMBER" \
                  --arg platform "$PLATFORM" \
                  --arg artifact_type "$ARTIFACT_TYPE" \
                  --arg checksum_sha256 "$CHECKSUM" \
                  --argjson size_bytes "$SIZE" \
                  '{app_identifier:$app_identifier, app_version:$app_version,
                    build_number:$build_number, platform:$platform,
                    artifact_type:$artifact_type, checksum_sha256:$checksum_sha256,
                    size_bytes:$size_bytes}')")

          ARTIFACT_ID=$(echo "$REGISTER" | jq -r '.id')
          UPLOAD_URL=$(echo "$REGISTER" | jq -r '.upload_url')
          if [ -z "$ARTIFACT_ID" ] || [ "$ARTIFACT_ID" = "null" ]; then
            echo "::error::register failed: $REGISTER"
            exit 1
          fi
          echo "registered artifact_id=$ARTIFACT_ID"

          # 2) PUT the bytes straight to the signed (S3) URL.
          curl -sS -X PUT --upload-file "$ARTIFACT_PATH" "$UPLOAD_URL"

          # 3) Finalize: Scout HEAD-validates the object size and marks it uploaded.
          curl -sS -X POST "$SCOUT_BASE_URL/api/v1/artifacts/$ARTIFACT_ID/finalize" \
            -H "Authorization: Bearer $SCOUT_TOKEN"

          echo "uploaded $ARTIFACT_PATH (artifact_id=$ARTIFACT_ID)"
